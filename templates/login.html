<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps AI Agent - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 217, 255, 0.3);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { color: #00d9ff; font-size: 28px; margin-bottom: 5px; }
        .logo p { color: #8b8b9a; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: #e0e0e0; font-size: 14px; margin-bottom: 8px; font-weight: 500; }
        .form-group input {
            width: 100%; padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 217, 255, 0.3);
            border-radius: 8px; color: #e0e0e0; font-size: 14px; transition: all 0.3s;
        }
        .form-group input:focus { outline: none; border-color: #00d9ff; background: rgba(255, 255, 255, 0.08); }
        .form-group textarea {
            width: 100%; padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 217, 255, 0.3);
            border-radius: 8px; color: #e0e0e0; font-size: 12px;
            font-family: 'Courier New', monospace;
            resize: vertical; min-height: 80px; transition: all 0.3s;
        }
        .form-group textarea:focus { outline: none; border-color: #00d9ff; background: rgba(255, 255, 255, 0.08); }
        .login-btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #00d9ff 0%, #0099ff 100%);
            border: none; border-radius: 8px; color: #000;
            font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s;
        }
        .login-btn:hover { transform: translateY(-2px); }
        .error-message {
            background: rgba(255, 68, 68, 0.2); border: 1px solid #ff4444;
            border-radius: 8px; padding: 12px; color: #ff4444; font-size: 14px;
            margin-bottom: 20px; display: none;
        }
        .help-text { color: #8b8b9a; font-size: 12px; margin-top: 5px; }
        .info-box {
            background: rgba(0, 217, 255, 0.1); border: 1px solid rgba(0, 217, 255, 0.3);
            border-radius: 8px; padding: 15px; margin-top: 20px;
        }
        .info-box h3 { color: #00d9ff; font-size: 14px; margin-bottom: 10px; }
        .info-box p { color: #8b8b9a; font-size: 12px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>🤖 DevOps AI Agent</h1>
            <p>Kubernetes Management Dashboard</p>
        </div>
        <div id="errorMessage" class="error-message"></div>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            <div class="form-group">
                <label for="k8s_token">Kubernetes Token</label>
                <textarea id="k8s_token" name="k8s_token" required placeholder="eyJhbGciOiJSUzI1NiIsImtpZCI6Ii..."></textarea>
                <div class="help-text">Your Kubernetes service account token (RBAC)</div>
            </div>
            <div class="form-group">
                <label for="k8s_server">Kubernetes API Server</label>
                <input type="text" id="k8s_server" name="k8s_server" value="https://kubernetes.default.svc" required>
            </div>
            <button type="submit" class="login-btn">🔐 Login</button>
        </form>
        <div class="info-box">
            <h3>ℹ️ How to get your Kubernetes token:</h3>
            <p>
                1. Contact your cluster admin for your service account<br>
                2. Run: <code>kubectl describe secret &lt;your-secret&gt;</code><br>
                3. Copy the token value and paste it above
            </p>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const k8s_token = document.getElementById('k8s_token').value.trim();
            const k8s_server = document.getElementById('k8s_server').value;
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.style.display = 'none';
            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, k8s_token, k8s_server })
                });
                const data = await response.json();
                if (data.success) { window.location.href = '/'; }
                else { errorDiv.textContent = data.message || 'Login failed'; errorDiv.style.display = 'block'; }
            } catch (error) {
                errorDiv.textContent = 'Connection error. Please try again.';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
